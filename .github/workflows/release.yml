name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: windows-latest
            platform: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.USERPROFILE }}\.cargo\registry
            ${{ env.USERPROFILE }}\.cargo\git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libusb-1.0-0-dev

      - name: Cache vcpkg downloads/binaries (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg-bincache
          key: vcpkg-${{ runner.os }}-libusb-x64-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-libusb-x64-

      - name: Install libusb via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg C:\vcpkg
            cmd.exe /d /c "C:\vcpkg\bootstrap-vcpkg.bat"
          }

          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_BINARY_SOURCES=clear;files,C:\vcpkg-bincache,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "C:\vcpkg\vcpkg.exe" install libusb:x64-windows

      - name: Patch nbis-rs for Windows MSVC build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo fetch

          $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { Join-Path $env:USERPROFILE ".cargo" }
          $checkouts = Join-Path $cargoHome "git\checkouts"
          $nbis = Get-ChildItem -Path $checkouts -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "nbis-rs-*" } |
            ForEach-Object { Get-ChildItem -Path $_.FullName -Directory -ErrorAction SilentlyContinue } |
            Where-Object { Test-Path (Join-Path $_.FullName "build.rs") } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $nbis) {
            throw "nbis-rs checkout not found under $checkouts (did cargo fetch run?)"
          }

          $buildRs = Join-Path $nbis.FullName "build.rs"
          $br = Get-Content -Raw $buildRs
          $updated = $false
          # Repair older cached patches that accidentally wrote literal PowerShell escape sequences.
          if ($br.Contains('`r`n')) {
            $br = $br.Replace('`r`n', "`r`n")
            $updated = $true
          }
          $cfgRelease = '.define("CMAKE_CONFIGURATION_TYPES", "Release")'
          $cfgDual = '.define("CMAKE_CONFIGURATION_TYPES", "Debug;Release")'
          if ($br.Contains($cfgRelease)) {
            $br = $br.Replace($cfgRelease, $cfgDual)
            $updated = $true
          }
          if ($br -notmatch "CMAKE_CONFIGURATION_TYPES") {
            $needle = '.define("CMAKE_BUILD_TYPE", "Release")'
            if ($br.Contains($needle)) {
              $replacement = "$needle`r`n        .define(`"CMAKE_CONFIGURATION_TYPES`", `"Debug;Release`")"
              $br = $br.Replace($needle, $replacement)
              $updated = $true
            }
          }
          if ($updated) {
            Set-Content -Path $buildRs -Value $br -NoNewline
          }

          $superbuild = Join-Path $nbis.FullName "ext\NFIQ2-2.3.0\CMakeLists.txt"
          if (Test-Path $superbuild) {
            $sb = Get-Content -Raw $superbuild
            $safeOsx = 'string(REPLACE ";" "$<SEMICOLON>" EXTERNALPROJECT_SAFE_OSX_ARCHITECTURES "${CMAKE_OSX_ARCHITECTURES}")'
            $safeCfg = 'string(REPLACE ";" "$<SEMICOLON>" EXTERNALPROJECT_SAFE_CMAKE_CONFIGURATION_TYPES "${CMAKE_CONFIGURATION_TYPES}")'
            if ($sb.Contains($safeOsx) -and -not $sb.Contains($safeCfg)) {
              $sb = $sb.Replace($safeOsx, "$safeOsx`r`n$safeCfg")
            }
            $sb = $sb.Replace('-DCMAKE_CONFIGURATION_TYPES=${CMAKE_CONFIGURATION_TYPES}', '-DCMAKE_CONFIGURATION_TYPES=${EXTERNALPROJECT_SAFE_CMAKE_CONFIGURATION_TYPES}')
            $sb = $sb.Replace('-DBUILD_WITH_STATIC_CRT=ON', '-DBUILD_WITH_STATIC_CRT=OFF')
            $sb = $sb.Replace('-DBUILD_WITH_STATIC_CRT=ON)', '-DBUILD_WITH_STATIC_CRT=OFF)')
            Set-Content -Path $superbuild -Value $sb -NoNewline
          }

          $compiler = Join-Path $nbis.FullName "ext\NFIQ2-2.3.0\cmake\compiler.cmake"
          if (Test-Path $compiler) {
            $cc = Get-Content -Raw $compiler
            $cc = $cc.Replace('string(REGEX REPLACE "/MD" "/MT"', 'string(REGEX REPLACE "/MD" "/MD"')
            $cc = $cc.Replace('string(REGEX REPLACE "/MDd" "/MTd"', 'string(REGEX REPLACE "/MDd" "/MDd"')
            Set-Content -Path $compiler -Value $cc -NoNewline
          }

      - name: Build release dist bundle (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/package_dist.sh

      - name: Build release dist bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CARGO_TARGET_DIR = Join-Path $env:RUNNER_TEMP "mktdp-target"
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package_dist.ps1

      - name: Archive dist (Linux)
        if: runner.os == 'Linux'
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="mktdp-driver-${TAG}-${{ matrix.platform }}-dist.tar.gz"
          tar -czf "$ARCHIVE" dist
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Archive dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $archive = "mktdp-driver-$tag-${{ matrix.platform }}-dist.zip"

          if (Test-Path $archive) {
            Remove-Item -Force $archive
          }

          Compress-Archive -Path ".\dist\*" -DestinationPath $archive -Force

          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii

          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
