# cbindgen configuration for fingerprint-driver

language = "C"
include_guard = "FINGERPRINT_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not edit. */"
tab_width = 4
style = "both"

[parse]
parse_deps = false

[export]
include = [
    "FP_OK",
    "FP_ERR_DEVICE_NOT_FOUND",
    "FP_ERR_USB_IO",
    "FP_ERR_TIMEOUT",
    "FP_ERR_NO_FINGER",
    "FP_ERR_IMAGE_INVALID",
    "FP_ERR_EXTRACT_FAIL",
    "FP_ERR_NULL_PTR",
    "FP_ERR_PANIC",
]

[fn]
rename_args = "CamelCase"
